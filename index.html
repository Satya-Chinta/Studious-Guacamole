<body>
    <div id="error-banner" role="alert" aria-live="polite"></div>
    <div id="default-homepage" aria-hidden="true">
        <h1>No KYC form found.</h1>
        <p class="subtext">To complete your KYC form, please access the link from the email.</p>
    </div>
    <div id="embed-container" class="hidden"></div>

    <script>
        (function () {
            "use strict";

            var DEFAULT_PAGE_TITLE = "KYC – Form Not Found";
            var PROPER_ASSIGNMENT_KEY_PATTERN = /^ASSIGN-WORKLIST\s+.+\s+(K-\d+)!.+$/i;

            function extractCaseIdFromAssignmentKey(assignmentId) {
                var match = assignmentId.match(PROPER_ASSIGNMENT_KEY_PATTERN);
                return match ? match[1] : null;
            }

            function setDocumentTitleForAssignment(assignmentId) {
                var caseId = extractCaseIdFromAssignmentKey(assignmentId);
                if (!caseId) {
                    log("info", "Assignment key is not properly formed; keeping default tab title.");
                    return;
                }

                document.title = "KYC Details " + caseId;
                log("info", "Document title set:", document.title);
            }

            var PEGA_CONFIG = {
                action: "openAssignment",
                themeID: "SelfServicePortal",
                casePage: "full",
                appAlias: "clmscs",
                pegaServerUrl: "https://testportal.amicorp.com/prweb/",
                grantType: "customBearer",
                clientId: "13741032106404931845"
            };

            function log(level, message, detail) {
                var prefix = "[AmicorpKYCBridge]";
                if (detail !== undefined) {
                    console[level](prefix, message, detail);
                } else {
                    console[level](prefix, message);
                }
            }

            function showError(message) {
                var banner = document.getElementById("error-banner");
                if (!banner) {
                    log("error", "Error banner element not found:", message);
                    return;
                }
                banner.textContent = message;
                banner.classList.add("visible");
            }

            function getAssignmentIdFromUrl() {
                try {
                    var params = new URLSearchParams(window.location.search);
                    var id = params.get("id");

                    if (id === null) {
                        log("info", "No 'id' query parameter in URL.");
                        return null;
                    }

                    id = id.trim();
                    if (!id) {
                        log("warn", "'id' query parameter is present but empty.");
                        return null;
                    }

                    log("info", "Assignment ID from URL:", id);
                    return id;
                } catch (err) {
                    log("error", "Failed to parse URL query parameters.", err);
                    throw err;
                }
            }

            function showDefaultHomepage() {
                var homepage = document.getElementById("default-homepage");
                var embedContainer = document.getElementById("embed-container");

                if (embedContainer) {
                    embedContainer.innerHTML = "";
                    embedContainer.classList.add("hidden");
                }
                if (homepage) {
                    homepage.classList.add("visible");
                    homepage.setAttribute("aria-hidden", "false");
                }
                log("info", "Showing default homepage (no assignment ID).");
                document.title = DEFAULT_PAGE_TITLE;
            }

            function createPegaEmbed(assignmentId) {
                var embed = document.createElement("pega-embed");
                embed.id = "theEmbed";
                embed.setAttribute("action", PEGA_CONFIG.action);
                embed.setAttribute("assignmentID", assignmentId);
                embed.setAttribute("themeID", PEGA_CONFIG.themeID);
                embed.setAttribute("casePage", PEGA_CONFIG.casePage);
                embed.setAttribute("appAlias", PEGA_CONFIG.appAlias);
                embed.setAttribute("pegaServerUrl", PEGA_CONFIG.pegaServerUrl);
                embed.setAttribute("grantType", PEGA_CONFIG.grantType);
                embed.setAttribute("clientId", PEGA_CONFIG.clientId);
                embed.style.width = "100%";

                embed.addEventListener("error", function (event) {
                    log("error", "pega-embed reported an error.", event);
                    showError("The assignment could not be loaded. Please check the link or try again later.");
                });

                return embed;
            }

            function loadPegaEmbed(assignmentId) {
                var homepage = document.getElementById("default-homepage");
                var embedContainer = document.getElementById("embed-container");

                if (!embedContainer) {
                    throw new Error("Embed container element #embed-container not found.");
                }

                if (homepage) {
                    homepage.classList.remove("visible");
                    homepage.setAttribute("aria-hidden", "true");
                }

                embedContainer.classList.remove("hidden");
                setDocumentTitleForAssignment(assignmentId);

                if (typeof customElements !== "undefined" &&
                    customElements.get("pega-embed") === undefined) {
                    log("warn", "pega-embed custom element not registered yet; script may still be loading.");
                }

                var embed = createPegaEmbed(assignmentId);
                embedContainer.appendChild(embed);
                log("info", "pega-embed element created and appended.", {
                    assignmentID: assignmentId,
                    id: embed.id
                });
            }

            function init() {
                log("info", "DOM loaded; initializing mashup.");

                try {
                    var assignmentId = getAssignmentIdFromUrl();

                    if (!assignmentId) {
                        showDefaultHomepage();
                        return;
                    }

                    loadPegaEmbed(assignmentId);
                } catch (err) {
                    log("error", "Initialization failed.", err);
                    showError("Something went wrong while starting the page. See the browser console for details.");
                    showDefaultHomepage();
                }
            }

            if (document.readyState === "loading") {
                document.addEventListener("DOMContentLoaded", init);
            } else {
                init();
            }
        })();
    </script>
