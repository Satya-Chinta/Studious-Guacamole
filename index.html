<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amicorp Header</title>
    <style>
      :root {
        --page-bg: #d8e1eb;
        --text: #15243a;
        --text-soft: #293750;
        --white: #ffffff;
        --border: rgba(21, 36, 58, 0.14);
        --hover: rgba(255, 255, 255, 0.48);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", Arial, sans-serif;
        color: var(--text);
        background: var(--page-bg);
      }

      .site-header {
        background: var(--page-bg);
        border-bottom: 1px solid rgba(255, 255, 255, 0.45);
      }

      .topbar {
        width: min(100%, 1280px);
        min-height: 60px;
        margin: 0 auto;
        padding: 0 18px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 24px;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        color: var(--text);
        text-decoration: none;
        flex-shrink: 0;
      }

      .brand-mark {
        width: 22px;
        height: 22px;
        display: block;
      }

      .brand-text {
        font-size: 16px;
        font-weight: 500;
        letter-spacing: 0.02em;
      }

      .nav-list {
        margin: 0;
        padding: 0;
        list-style: none;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 6px;
        flex-wrap: wrap;
      }

      .nav-link,
      .nav-button {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 34px;
        padding: 0 10px;
        border-radius: 999px;
        border: 1px solid transparent;
        color: var(--text-soft);
        text-decoration: none;
        background: transparent;
        font: inherit;
        font-size: 12px;
        white-space: nowrap;
        cursor: pointer;
      }

      .nav-link:hover,
      .nav-button:hover {
        background: var(--hover);
        border-color: var(--border);
      }

      .caret {
        font-size: 10px;
        line-height: 1;
        transform: translateY(-1px);
      }

      .page-note {
        width: min(100%, 1280px);
        margin: 0 auto;
        padding: 48px 18px;
        color: rgba(21, 36, 58, 0.78);
      }

      .page-note h1 {
        margin: 0 0 10px;
        font-size: clamp(30px, 4vw, 48px);
        line-height: 1.05;
      }

      .page-note p {
        margin: 0;
        max-width: 760px;
        font-size: 16px;
        line-height: 1.65;
      }

      @media (max-width: 980px) {
        .topbar {
          align-items: flex-start;
          flex-direction: column;
          padding-top: 14px;
          padding-bottom: 14px;
        }

        .nav-list {
          justify-content: flex-start;
        }
      }

      @media (max-width: 640px) {
        .nav-link,
        .nav-button {
          padding-inline: 8px;
          font-size: 11px;
        }

        .brand-text {
          font-size: 15px;
        }
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="topbar">
        <a class="brand" href="https://www.amicorp.com/" aria-label="Amicorp home">
          <svg
            class="brand-mark"
            viewBox="0 0 24 24"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
            aria-hidden="true"
          >
            <circle cx="12" cy="12" r="11" stroke="#1A2B44" stroke-width="1" />
            <path
              d="M5.3 8.1C7.1 6.8 9.6 6 12.2 6C15.1 6 17.6 6.9 19.2 8.2"
              stroke="#1A2B44"
              stroke-width="1"
              stroke-linecap="round"
            />
            <path
              d="M4.8 12C7 10.7 9.6 10 12.2 10C14.8 10 17.1 10.7 19.3 12"
              stroke="#1A2B44"
              stroke-width="1"
              stroke-linecap="round"
            />
            <path
              d="M5.2 15.9C7 17.1 9.5 18 12.2 18C15 18 17.4 17.2 19.1 15.9"
              stroke="#1A2B44"
              stroke-width="1"
              stroke-linecap="round"
            />
          </svg>
          <span class="brand-text">AMICORP</span>
        </a>

        <nav aria-label="Primary">
          <ul class="nav-list">
            <li><a class="nav-link" href="https://www.amicorp.com/company/">Company</a></li>
            <li><a class="nav-link" href="https://www.amicorp.com/services/">Services</a></li>
            <li><a class="nav-link" href="https://www.amicorp.com/ami-news/">Our News</a></li>
            <li><a class="nav-link" href="https://www.amicorp.com/sustainability/">Sustainability</a></li>
            <li><a class="nav-link" href="https://www.amicorp.com/locations/">Locations</a></li>
            <li><a class="nav-link" href="https://www.amicorp.com/our-people/">Our People</a></li>
            <li><a class="nav-link" href="https://www.amicorp.com/careers/">Careers</a></li>
            <li><a class="nav-link" href="https://www.amicorp.com/contact-us/">Contact us</a></li>
            <li>
              <button class="nav-button" type="button">
                Portals <span class="caret">+</span>
              </button>
            </li>
            <li>
              <button class="nav-button" type="button">
                English <span class="caret">+</span>
              </button>
            </li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="page-note">
      <h1>Amicorp-Style Header</h1>
      <p>
        This standalone header is styled to match the layout shown in your screenshot and follows the
        navigation structure from the live Amicorp website.
      </p>
    </main>
  </body>
</html>
