  <head>
    <meta charset="UTF-8" />

    <title>Page not found — Amicorp</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --page-bg: #e6ebf0;
        --navy: #1a2b56;
        --btn-bg: #f05a5a;
        --btn-text: #ffffff;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: var(--page-bg);
        color: var(--navy);
        font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
      }

      .masthead {
        background: var(--page-bg);
        border-bottom: 1px solid rgba(26, 43, 86, 0.08);
      }

      .masthead-inner {
        max-width: 1440px;
        margin: 0 auto;
        padding: 14px 40px 14px 36px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 28px;
      }

      .brand {
        display: flex;
        align-items: center;
        flex-shrink: 0;
      }

      .brand img {
        display: block;
        height: 46px;
        width: auto;
        max-width: 200px;
        object-fit: contain;
        pointer-events: none;
        user-select: none;
      }

      .nav {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: flex-end;
        gap: 0 22px;
        row-gap: 8px;
      }

      .nav-item {
        font-size: 13px;
        font-weight: 500;
        letter-spacing: 0.01em;
        color: var(--navy);
        white-space: nowrap;
        user-select: none;
        pointer-events: none;
        display: inline-flex;
        align-items: center;
        gap: 5px;
      }

      .nav-item .chev {
        display: inline-block;
        width: 0;
        height: 0;
        margin-left: 1px;
        border-left: 4px solid transparent;
        border-right: 4px solid transparent;
        border-top: 5px solid var(--navy);
        opacity: 0.85;
        transform: translateY(1px);
      }

      .main {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        min-height: calc(100vh - 76px);
        padding: 48px 24px 64px;
      }

      .main h1 {
        margin: 0 0 12px;
        font-size: clamp(42px, 7vw, 72px);
        font-weight: 700;
        line-height: 1.05;
        letter-spacing: -0.02em;
        color: var(--navy);
      }

      .main .sub {
        margin: 0 0 32px;
        font-size: 15px;
        font-weight: 400;
        color: var(--navy);
        opacity: 0.92;
      }

      .cta-pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 14px 34px;
        border-radius: 999px;
        background: var(--btn-bg);
        color: var(--btn-text);
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.02em;
        user-select: none;
        pointer-events: none;
      }

      @media (max-width: 1024px) {
        .masthead-inner {
          padding: 14px 20px;
          flex-direction: column;
          align-items: flex-start;
        }

        .nav {
          justify-content: flex-start;
          width: 100%;
        }
      }

      @media (max-width: 640px) {
        .nav {
          gap: 0 14px;
        }

        .nav-item {
          font-size: 12px;
        }

        .brand img {
          height: 40px;
        }
      }
    </style>
  </head>
  <body>
    <header class="masthead">
      <div class="masthead-inner">
        <div class="brand">
          <img src="assets/amicorp-logo.png" alt="Amicorp" />
        </div>
        <nav class="nav" aria-label="Primary">
          <span class="nav-item">Company</span>
          <span class="nav-item">Services</span>
          <span class="nav-item">Our News</span>
          <span class="nav-item">Sustainability</span>
          <span class="nav-item">Locations</span>
          <span class="nav-item">Our People</span>
          <span class="nav-item">Careers</span>
          <span class="nav-item">Contact us</span>
          <span class="nav-item">Portals<span class="chev" aria-hidden="true"></span></span>
          <span class="nav-item">English<span class="chev" aria-hidden="true"></span></span>
        </nav>
      </div>
    </header>

    <main class="main">
      <h1>Page not found</h1>
      <p class="sub">Page not found</p>
